<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <header class="bg-primary">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="#">
                <img src="images/logo.svg" class="logo" alt="logo">
            </a>
            <nav>
                <ul class="nav nav-pills fs-6">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="">Ofertas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white"  href="">Contacto</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div  class="container py-4">
            <img src="images/banner.svg" alt="banner"  class="img-fluid w-100 rounded shadow">
        </div>
        <section class="container my-5">
            <h2 class="fs-4">Colecciones de tienda</h2>
            <div class="row text-center g-3 py-4">
                <article class="col-12 col-md-6 col-lg-3">
                    <img src="images/jordan_r.webp" alt="" class="img-fluid rounded">
                    <h3 class="fs-6 mt-2">Jordan retro</h3>
                </article>
                <article class="col-12 col-md-6 col-lg-3">
                    <img src="images/new_b.jfif" alt="" class="img-fluid rounded">
                    <h3 class="fs-6 mt-2">New Balance</h3>
                </article>
                <article class="col-12 col-md-6 col-lg-3">
                    <img src="images/air_max.jfif" alt="" class="img-fluid rounded">
                    <h3 class="fs-6 mt-2">Air Max</h3>
                </article>
                <article class="col-12 col-md-6 col-lg-3">
                    <img src="images/adidas.webp" alt="" class="img-fluid rounded">
                    <h3 class="fs-6 mt-2">Adidas</h3>
                </article>
            </div>
        </section>
    </main>
    <footer class="bg-danger text-white py-3">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <h2 class="fs-5 m-0">Urban Store</h2>
            <nav>
                <a href="#" class="text-white text-decoration-none mx-3">Productos</a>
                <a href="#" class="text-white text-decoration-none mx-3">Ofertas</a>
                <a href="#" class="text-white text-decoration-none mx-3">Contacto</a>
            </nav>
            <div>
                <a href="#" class="mx-2 fs-5"><i class="bi bi-facebook"></i></a>
                <a href="#" class="mx-2 fs-5"><i class="bi bi-instagram"></i></a>
                <a href="#" class="mx-2 fs-5"><i class="bi bi-twitter-x"></i></a>
            </div>
        </div>
    </footer>    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body> 
</html>
